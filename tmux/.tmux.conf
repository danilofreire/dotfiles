# Minimal tmux configuration for the multi-agent Claude Code workflow
# Created: 2026-03-10

# Enable mouse support (click between panes, scroll, resize)
set -g mouse on

# Increase scrollback buffer
set -g history-limit 50000

# Show pane titles on the top border
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

# Pane border colours (visible but not distracting)
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour75

# Status bar
set -g status-style bg=colour235,fg=colour248
set -g status-left "[#S] "
set -g status-right "%H:%M"

# Start window and pane numbering at 0 (default, explicit for clarity)
set -g base-index 0
setw -g pane-base-index 0

# Copy to system clipboard
set -s copy-command 'pbcopy'
set -s set-clipboard on

# Reduce escape delay (better for neovim)
set -sg escape-time 10

# Pass modifier key combinations (e.g. Shift+Enter) to applications
set -g extended-keys on

# True colour support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Toggle preview pane
bind p run-shell "tmux-work preview"
