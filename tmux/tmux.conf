# Minimal tmux configuration for the multi-agent Claude Code workflow
# Created: 2026-03-10

# Enable mouse support (click between panes, scroll, resize)
set -g mouse on

# Increase scrollback buffer
set -g history-limit 50000

# Show pane titles on the top border
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

# Pane border colours (visible but not distracting)
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour75

# Status bar
set -g status-style bg=colour235,fg=colour248
set -g status-left "[#S] "
set -g status-right "%H:%M"

# Start window and pane numbering at 0 (default, explicit for clarity)
set -g base-index 0
setw -g pane-base-index 0

# Copy to system clipboard. Pick the first available helper at tmux start:
# pbcopy on macOS, wl-copy on Wayland Linux, xclip on X11 Linux. If none
# are installed (e.g. a headless VPS), no copy-command is set and tmux's
# default selection behaviour applies.
if-shell "command -v pbcopy >/dev/null 2>&1" "set -s copy-command 'pbcopy'"
if-shell "command -v wl-copy >/dev/null 2>&1" "set -s copy-command 'wl-copy'"
if-shell "command -v xclip >/dev/null 2>&1" "set -s copy-command 'xclip -selection clipboard -in'"
set -s set-clipboard on

# Reduce escape delay (better for neovim)
set -sg escape-time 10

# Pass modifier key combinations (e.g. Shift+Enter) to applications
set -g extended-keys on

# True colour support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Toggle preview pane
bind p run-shell "tmux-work preview"

# --- Plugins (managed by TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-continuum: auto-save every 15 minutes, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-resurrect: save pane contents
set -g @resurrect-capture-pane-contents 'on'

# Initialise TPM (keep this line at the very bottom). Only run if TPM is
# installed — on machines without it (fresh VPS), tmux starts cleanly with
# no plugin loading.
if-shell "[ -f ~/.tmux/plugins/tpm/tpm ]" "run '~/.tmux/plugins/tpm/tpm'"
